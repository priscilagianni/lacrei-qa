name: Cypress Tests - Lacrei Saúde

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  cypress-run:
    name: Executar testes automatizados
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Executar testes Cypress (cadastro)
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          spec: cypress/e2e/cadastro.feature
        env:
          CYPRESS_BASE_URL: https://paciente-staging.lacreisaude.com.br

      - name: Salvar relatórios como artefato
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-results
          path: |
            cypress/screenshots
            cypress/videos
          retention-days: 7
